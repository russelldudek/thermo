name: Materialize audited campaign

on:
  push:
    branches: [main]
    paths:
      - '.campaign-upload/ready.json'

permissions:
  contents: write
  issues: read
  pages: write
  id-token: write

concurrency:
  group: thermo-campaign-publication
  cancel-in-progress: false

jobs:
  publish:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publication trigger
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch, verify, and materialize exact campaign
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from urllib.request import Request, urlopen
          import base64, hashlib, json, os, tarfile

          meta = json.loads(Path('.campaign-upload/ready.json').read_text())
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
              'User-Agent': 'thermo-campaign-materializer',
              'X-GitHub-Api-Version': '2022-11-28',
          }
          def fetch_json(url):
              with urlopen(Request(url, headers=headers)) as response:
                  return json.load(response)

          base = f"https://api.github.com/repos/{os.environ['GH_REPOSITORY']}"
          issue_number = meta['issue_number']
          issue = fetch_json(f'{base}/issues/{issue_number}')
          comments = fetch_json(f'{base}/issues/{issue_number}/comments?per_page=100')
          bodies = [(issue.get('body') or '').encode()] + [
              (comment.get('body') or '').encode() for comment in comments
          ]
          if len(bodies) < len(meta['parts']):
              raise SystemExit('transport issue is missing payload bodies')

          parts = []
          for item in meta['parts']:
              raw = bodies[item['index']]
              if len(raw) < item['bytes']:
                  raise SystemExit(f"short payload body {item['index']}")
              data = raw[:item['bytes']]
              if hashlib.sha256(data).hexdigest() != item['sha256']:
                  raise SystemExit(f"payload hash mismatch {item['index']}")
              parts.append(data)

          joined = b''.join(parts)
          if len(joined) != meta['base64_bytes']:
              raise SystemExit('base64 size mismatch')
          if hashlib.sha256(joined).hexdigest() != meta['base64_sha256']:
              raise SystemExit('base64 hash mismatch')
          archive = base64.b64decode(joined, validate=True)
          if len(archive) != meta['archive_bytes']:
              raise SystemExit('archive size mismatch')
          if hashlib.sha256(archive).hexdigest() != meta['archive_sha256']:
              raise SystemExit('archive hash mismatch')

          out = Path('/tmp/thermo-campaign')
          out.mkdir(parents=True, exist_ok=True)
          archive_path = Path('/tmp/thermo-campaign.tar.gz')
          archive_path.write_bytes(archive)
          with tarfile.open(archive_path, 'r:gz') as tf:
              for member in tf.getmembers():
                  target = (out / member.name).resolve()
                  if out.resolve() not in target.parents and target != out.resolve():
                      raise SystemExit(f'unsafe archive path: {member.name}')
              tf.extractall(out)

          files = [p for p in out.rglob('*') if p.is_file()]
          if len(files) != meta['expected_files']:
              raise SystemExit(f"file-count mismatch: {len(files)}")
          required = [
              'index.html', 'styles.css', 'brand-tokens.css', 'app.js',
              'resume.html', 'cover-letter.html', 'interview-brief.html',
              '120-day-plan.html', 'architecture-review.html',
              'assets/brand/thermo-fisher-wordmark.png',
              'docs/Russell-Dudek-Thermo-Fisher-Resume.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-Cover-Letter.pdf'
          ]
          for rel in required:
              path = out / rel
              if not path.is_file() or path.stat().st_size == 0:
                  raise SystemExit(f'missing required file: {rel}')
          PY

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/thermo-campaign/. .

          python - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path
          from urllib.parse import urlsplit
          import re

          root = Path('.')
          html_files = sorted(root.glob('*.html'))
          if len(html_files) != 6:
              raise SystemExit(f'expected 6 HTML routes, found {len(html_files)}')
          missing = []
          class RefParser(HTMLParser):
              def handle_starttag(self, tag, attrs):
                  attrs = dict(attrs)
                  for key in ('href', 'src'):
                      value = attrs.get(key)
                      if not value or value.startswith(('#', 'http:', 'https:', 'mailto:', 'tel:', 'data:')):
                          continue
                      path = urlsplit(value).path
                      if path and not (root / path).exists():
                          missing.append((self.file, value))
          for html in html_files:
              parser = RefParser(); parser.file = html.name
              text = html.read_text(errors='ignore')
              parser.feed(text)
              if 'brand-tokens.css?v=20260714-2' not in text or 'styles.css?v=20260714-2' not in text:
                  raise SystemExit(f'explicit CSS links missing: {html}')
              if text.lower().count('<h1') != 1:
                  raise SystemExit(f'exactly one h1 required: {html}')
          if missing:
              raise SystemExit(f'missing local references: {missing}')

          forbidden_token = ''.join(map(chr, [114,111,108,101,102,111,114,103,101]))
          forbidden = re.compile(forbidden_token, re.I)
          public_types = {'.html','.css','.js','.json','.md','.txt','.yml','.yaml','.svg','.xml'}
          hits = []
          for path in root.rglob('*'):
              if path.is_file() and path.suffix.lower() in public_types:
                  if forbidden.search(path.read_text(errors='ignore')):
                      hits.append(str(path))
          if hits:
              raise SystemExit(f'confidential internal-name matches: {hits}')
          print(f'Validated {len(html_files)} HTML routes and all local references.')
          PY

      - name: Commit complete campaign to main
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish complete Thermo Fisher candidate campaign'
          git push origin HEAD:main
          echo "published_head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload exact published site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
