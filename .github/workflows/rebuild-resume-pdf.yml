name: Rebuild downloadable resume PDF

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/rebuild-resume-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PDF build and verification tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y poppler-utils qpdf
          python -m pip install --disable-pip-version-check weasyprint pypdf pillow

      - name: Generate resume from committed HTML and CSS
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from weasyprint import HTML

          root = Path('.').resolve()
          target = root / 'docs' / 'Russell-Dudek-Thermo-Fisher-Resume.pdf'
          target.parent.mkdir(exist_ok=True)
          HTML(filename=str(root / 'resume.html'), base_url=str(root)).write_pdf(str(target))
          PY

      - name: Reject blank, malformed, or incorrectly paginated output
        run: |
          set -euo pipefail
          qpdf --check docs/Russell-Dudek-Thermo-Fisher-Resume.pdf
          rm -rf /tmp/resume-render
          mkdir -p /tmp/resume-render
          pdftoppm -png -r 120 docs/Russell-Dudek-Thermo-Fisher-Resume.pdf /tmp/resume-render/page
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          from PIL import Image, ImageChops, ImageStat

          path = Path('docs/Russell-Dudek-Thermo-Fisher-Resume.pdf')
          reader = PdfReader(str(path), strict=True)
          assert len(reader.pages) == 2, f'expected 2 pages, got {len(reader.pages)}'
          text_lengths = [len((page.extract_text() or '').strip()) for page in reader.pages]
          assert min(text_lengths) > 1800, f'blank or sparse page: {text_lengths}'

          images = sorted(Path('/tmp/resume-render').glob('page-*.png'))
          assert len(images) == 2, f'expected 2 rendered pages, got {len(images)}'
          for image_path in images:
              image = Image.open(image_path).convert('L')
              mean = ImageStat.Stat(image).mean[0]
              assert image.getextrema()[0] < 80, f'no dark content on {image_path}'
              assert mean < 248, f'page appears blank: {image_path}, mean={mean}'
              bbox = ImageChops.difference(image, Image.new('L', image.size, 255)).getbbox()
              assert bbox and bbox[3] > int(image.height * 0.84), f'underfilled render: {image_path}, bbox={bbox}'

          all_text = '\n'.join((page.extract_text() or '') for page in reader.pages).lower()
          assert 'github.com/russelldudek/thermo' not in all_text
          assert 'roleforge' not in all_text
          print('Verified two rendered pages:', text_lengths)
          PY

      - name: Commit the verified PDF and remove the one-time workflow
        run: |
          set -euo pipefail
          rm -f .github/workflows/rebuild-resume-pdf.yml
          git config user.name 'Russell Dudek'
          git config user.email 'russelldudek@gmail.com'
          git add -A docs/Russell-Dudek-Thermo-Fisher-Resume.pdf .github/workflows/rebuild-resume-pdf.yml
          git commit -m 'Repair downloadable resume PDF rendering'
          git push origin HEAD:main
