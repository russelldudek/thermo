name: Materialize candidate campaign

on:
  push:
    branches: [main]
    paths:
      - '.campaign-source/**'
      - '.github/workflows/materialize.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct verified source archive
        shell: bash
        run: |
          set -euo pipefail
          cat .campaign-source/source.part-* | base64 --decode > /tmp/thermo-source.tar.gz
          echo '32ce922a7c899fac3d7d8e63532d1817b6d2df949681a29916ab0fd49c2a7761  /tmp/thermo-source.tar.gz' | sha256sum --check
          tar -xzf /tmp/thermo-source.tar.gz -C .

      - name: Install publication dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --disable-pip-version-check pillow
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Materialize official brand derivatives
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --retry 4 --retry-delay 3 \
            'https://s27.q4cdn.com/797047529/files/doc_financials/2024/ar/2025-AR-Bookmarked-10-K.pdf' \
            --output /tmp/thermo-annual-report.pdf
          pdftoppm -f 2 -l 2 -singlefile -png -r 300 \
            /tmp/thermo-annual-report.pdf /tmp/thermo-page2
          mkdir -p assets/brand
          python - <<'PY'
          from pathlib import Path
          from PIL import Image

          page = Image.open('/tmp/thermo-page2.png').convert('RGB')
          logo = page.crop((922, 210, 1465, 340))
          logo.save('assets/brand/thermo-fisher-wordmark.png', optimize=True)
          lab = page.crop((23, 1977, 2373, 3206)).resize((1000, 523), Image.Resampling.LANCZOS)
          lab.save('assets/brand/automated-laboratory.jpg', quality=90, optimize=True, progressive=True)
          for rel in ('assets/brand/thermo-fisher-wordmark.png', 'assets/brand/automated-laboratory.jpg'):
              path = Path(rel)
              if path.stat().st_size < 1000:
                  raise SystemExit(f'brand asset is unexpectedly small: {rel}')
              print(rel, path.stat().st_size)
          PY

      - name: Generate print artifacts
        shell: bash
        run: |
          set -euo pipefail
          python -m http.server 4173 --bind 127.0.0.1 >/tmp/thermo-http.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            curl --silent --fail http://127.0.0.1:4173/index.html >/dev/null && break
            sleep 1
          done
          node qa/generate-pdfs.mjs
          python qa/finalize-publication.py

      - name: Verify complete public tree
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          routes = [
              'index.html', 'resume.html', 'cover-letter.html',
              'interview-brief.html', '120-day-plan.html', 'architecture-review.html'
          ]
          required = routes + [
              'styles.css', 'brand-tokens.css', 'app.js', 'README.md',
              'brand-intelligence.md', 'source-notes.md', 'campaign-audit.md',
              'artifact-manifest.json', 'publish-manifest.json',
              'assets/brand/thermo-fisher-wordmark.png',
              'assets/brand/automated-laboratory.jpg',
              'docs/Russell-Dudek-Thermo-Fisher-Resume.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-Cover-Letter.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-Interview-Brief.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-120-Day-Plan.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-Architecture-Review.pdf',
              'qa/campaign-audit.json', 'qa/full-site-audit.json',
              '.github/workflows/deploy-pages.yml', '.nojekyll'
          ]
          for rel in required:
              path = root / rel
              if not path.exists():
                  raise SystemExit(f'missing required path: {rel}')
              if path.is_file() and rel != '.nojekyll' and path.stat().st_size == 0:
                  raise SystemExit(f'empty required file: {rel}')
          for rel in routes:
              text = (root / rel).read_text()
              for sheet in ('brand-tokens.css', 'styles.css'):
                  if sheet not in text:
                      raise SystemExit(f'{rel} does not load {sheet}')
              if '<h1' not in text.lower():
                  raise SystemExit(f'{rel} has no H1')
          index = (root / 'index.html').read_text()
          if 'data-reset-scenarios' not in index:
              raise SystemExit('smart-start reset control missing')
          resume = (root / 'resume.html').read_text()
          cover = (root / 'cover-letter.html').read_text()
          if 'cover-letter.html' not in resume or 'resume.html' not in cover:
              raise SystemExit('reciprocal document navigation missing')
          forbidden = re.compile(r'role[\s_-]*forge', re.I)
          for path in root.rglob('*'):
              if not path.is_file() or any(part in {'.git', 'node_modules', '.campaign-source'} for part in path.parts):
                  continue
              if path.suffix.lower() in {'.html', '.css', '.js', '.mjs', '.py', '.json', '.md', '.txt', '.yml', '.yaml', '.svg', '.xml'}:
                  if forbidden.search(path.read_text(errors='ignore')):
                      raise SystemExit(f'candidate-facing confidentiality failure: {path}')
          print(f'verified {len(required)} required paths and {len(routes)} styled routes')
          PY

      - name: Commit complete campaign to main
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .campaign-source
          rm -f .github/workflows/materialize.yml
          rm -rf node_modules package.json package-lock.json
          git config user.name 'Russell Dudek'
          git config user.email 'russelldudek@gmail.com'
          git add -A
          git commit -m 'Publish complete Thermo Fisher candidate campaign and repair asset loading'
          git push origin HEAD:main
