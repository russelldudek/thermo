name: Apply recruiter-facing document correction

on:
  push:
    branches: [main]
    paths:
      - '120-day-plan.html'
      - '.github/workflows/candidate-document-correction.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  correct-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out current main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install document QA dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y poppler-utils
          python -m pip install --disable-pip-version-check weasyprint pypdf pillow

      - name: Remove source-control links from recruiter-facing surfaces
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          owner = 'russell' + 'dudek'
          repo = 'ther' + 'mo'
          host = 'git' + 'hub.com'
          bare = f'{host}/{owner}/{repo}'
          full = f'https://{bare}'

          text_suffixes = {'.html', '.md', '.json', '.css', '.js', '.mjs', '.txt', '.yml', '.yaml', '.xml', '.svg'}
          linked_contact = ('Pittsburgh, Pennsylvania · <a href="tel:+14122878640">412.287.8640</a> · '
                            '<a href="mailto:russelldudek@gmail.com">russelldudek@gmail.com</a><br>'
                            '<a href="https://www.linkedin.com/in/russelldudek">linkedin.com/in/russelldudek</a> · '
                            '<a href="https://russelldudek.github.io/thermo/">russelldudek.github.io/thermo</a>')
          plain_contact = ('Pittsburgh, Pennsylvania · 412.287.8640 · russelldudek@gmail.com<br>'
                           'linkedin.com/in/russelldudek · russelldudek.github.io/thermo')

          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in text_suffixes:
                  continue
              text = path.read_text(errors='ignore')
              original = text

              # Remove linked and raw references to the campaign source repository.
              text = re.sub(
                  rf'<a\b[^>]*href=["\'](?:https?://)?{re.escape(bare)}/?["\'][^>]*>.*?</a>',
                  '', text, flags=re.I | re.S
              )
              text = re.sub(rf'(?:https?://)?{re.escape(bare)}/?', '', text, flags=re.I)

              # Convert the standard candidate contact line into accessible links.
              text = text.replace(plain_contact, linked_contact)

              # Clean punctuation left behind by removed links.
              text = re.sub(r'\s*·\s*·\s*', ' · ', text)
              text = re.sub(r'<br>\s*·\s*', '<br>', text)
              text = re.sub(r'\s+([,.;:])', r'\1', text)
              text = re.sub(r'(<br>|>)\s*·\s*(</div>|</span>|</p>)', r'\1\2', text)

              if text != original:
                  path.write_text(text)
                  print(f'corrected {path}')

          # Source repository links are forbidden on all retained public text surfaces.
          failures = []
          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path.suffix.lower() not in text_suffixes:
                  continue
              if path.as_posix() == '.github/workflows/candidate-document-correction.yml':
                  continue
              lowered = path.read_text(errors='ignore').lower()
              if bare.lower() in lowered or full.lower() in lowered:
                  failures.append(path.as_posix())
          if failures:
              raise SystemExit(f'source repository link remains in: {failures}')
          PY

      - name: Regenerate all downloadable PDFs
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          from weasyprint import HTML

          root = Path('.').resolve()
          docs = root / 'docs'
          docs.mkdir(exist_ok=True)
          outputs = {
              'resume.html': 'Russell-Dudek-Thermo-Fisher-Resume.pdf',
              'cover-letter.html': 'Russell-Dudek-Thermo-Fisher-Cover-Letter.pdf',
              'interview-brief.html': 'Russell-Dudek-Thermo-Fisher-Interview-Brief.pdf',
              '120-day-plan.html': 'Russell-Dudek-Thermo-Fisher-120-Day-Plan.pdf',
              'architecture-review.html': 'Russell-Dudek-Thermo-Fisher-Architecture-Review.pdf',
          }
          for source, target in outputs.items():
              HTML(filename=str(root / source), base_url=str(root)).write_pdf(str(docs / target))
              print(f'generated {target}')
          PY

      - name: Verify page counts, content, and confidentiality
        run: |
          set -euo pipefail
          rm -f .github/workflows/candidate-document-correction.yml
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          from PIL import Image, ImageStat
          import json
          import re
          import subprocess

          root = Path('.')
          expected = {
              'docs/Russell-Dudek-Thermo-Fisher-Resume.pdf': 2,
              'docs/Russell-Dudek-Thermo-Fisher-Cover-Letter.pdf': 1,
              'docs/Russell-Dudek-Thermo-Fisher-Interview-Brief.pdf': 3,
              'docs/Russell-Dudek-Thermo-Fisher-120-Day-Plan.pdf': 4,
              'docs/Russell-Dudek-Thermo-Fisher-Architecture-Review.pdf': 1,
          }
          owner = 'russell' + 'dudek'
          repo = 'ther' + 'mo'
          source_marker = ('git' + 'hub.com' + f'/{owner}/{repo}').lower()
          forbidden = re.compile(r'role[\s_-]*forge', re.I)
          results = {'pdf_page_counts': {}, 'pdf_text_lengths': {}, 'raster_checks': {}, 'source_repository_matches': 0, 'internal_name_matches': 0}

          raster_root = Path('/tmp/thermo-pdf-raster')
          raster_root.mkdir(exist_ok=True)
          for rel, count in expected.items():
              path = root / rel
              reader = PdfReader(str(path))
              actual = len(reader.pages)
              if actual != count:
                  raise SystemExit(f'{rel}: expected {count} pages, got {actual}')
              results['pdf_page_counts'][rel] = actual
              page_lengths = []
              for page in reader.pages:
                  text = page.extract_text() or ''
                  page_lengths.append(len(text.strip()))
                  if source_marker in text.lower():
                      results['source_repository_matches'] += 1
                  if forbidden.search(text):
                      results['internal_name_matches'] += 1
              results['pdf_text_lengths'][rel] = page_lengths
              if any(length < 350 for length in page_lengths):
                  raise SystemExit(f'{rel}: unexpectedly sparse or blank page text {page_lengths}')
              metadata = ' '.join(str(value) for value in (reader.metadata or {}).values())
              if source_marker in metadata.lower() or forbidden.search(metadata):
                  raise SystemExit(f'{rel}: forbidden metadata')

              prefix = raster_root / path.stem
              subprocess.run(['pdftoppm', '-png', '-r', '96', str(path), str(prefix)], check=True, stdout=subprocess.DEVNULL)
              page_checks = []
              for image_path in sorted(raster_root.glob(f'{path.stem}-*.png')):
                  image = Image.open(image_path).convert('L')
                  stat = ImageStat.Stat(image)
                  extrema = image.getextrema()
                  page_checks.append({'file': image_path.name, 'mean': round(stat.mean[0], 2), 'extrema': list(extrema)})
                  if extrema[0] > 245 or stat.mean[0] > 253:
                      raise SystemExit(f'{rel}: rasterized page appears blank: {image_path.name}')
              results['raster_checks'][rel] = page_checks

          plan_text = '\n'.join((page.extract_text() or '') for page in PdfReader('docs/Russell-Dudek-Thermo-Fisher-120-Day-Plan.pdf').pages)
          required_plan_phrases = [
              'Stakeholder topology', 'Proof-selection criteria', 'Four synchronized workstreams',
              'Decision-rights model to validate', 'Balanced architecture scorecard', 'Discovery boundary'
          ]
          missing = [phrase for phrase in required_plan_phrases if phrase not in plan_text]
          if missing:
              raise SystemExit(f'expanded plan content missing from PDF: {missing}')
          if results['source_repository_matches'] or results['internal_name_matches']:
              raise SystemExit(f'confidentiality failures: {results}')

          qa = root / 'qa'
          qa.mkdir(exist_ok=True)
          (qa / 'document-correction-audit.json').write_text(json.dumps(results, indent=2) + '\n')
          PY

      - name: Refresh public audit and artifact manifest
        run: |
          set -euo pipefail
          cat > campaign-audit.md <<'EOF'
          # Campaign audit

          Campaign state: source complete; live exact-head verification remains dependent on GitHub Pages deployment visibility.

          User-directed correction:

          1. The original 120-day plan carried the right four phases but was too sparse to function as an executive entry plan.
          2. Recruiter-facing HTML and generated documents exposed the campaign source-repository link, which is publication infrastructure rather than candidate contact information.

          Corrections: expanded the entry plan from three sparse pages to four substantive pages covering stakeholder topology, evidence baselining, proof-selection criteria, six architecture boundaries, pre-mortem and decision records, synchronized solution/control/run/adoption workstreams, review cadence, evidence package, reusable asset set, decision rights, balanced scorecard, leadership readout, and an explicit discovery boundary. Removed the source-repository link from every retained public text surface and regenerated all five PDFs.

          QA: exact PDF page counts are 2 / 1 / 3 / 4 / 1. Every PDF page passed text-density and nonblank raster checks. The expanded plan PDF contains all required operating sections. Public HTML and PDF text/metadata scans returned zero source-repository-link matches and zero forbidden internal-system-name matches.

          Candidate-facing confidentiality: passed for the committed source and generated documents. Live deployment verification remains separate from source verification.
          EOF
          python - <<'PY'
          from pathlib import Path
          from pypdf import PdfReader
          import hashlib
          import json

          root = Path('.')
          routes = ['index.html', 'resume.html', 'cover-letter.html', 'interview-brief.html', '120-day-plan.html', 'architecture-review.html']
          pdfs = [
              'docs/Russell-Dudek-Thermo-Fisher-Resume.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-Cover-Letter.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-Interview-Brief.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-120-Day-Plan.pdf',
              'docs/Russell-Dudek-Thermo-Fisher-Architecture-Review.pdf',
          ]
          files = []
          for path in sorted(root.rglob('*')):
              if not path.is_file() or '.git' in path.parts:
                  continue
              data = path.read_bytes()
              files.append({'path': path.as_posix(), 'bytes': len(data), 'sha256': hashlib.sha256(data).hexdigest()})
          manifest = {
              'campaign': 'Thermo Fisher Scientific - Sr Staff AI Architect',
              'state': 'source-audited',
              'routes': routes,
              'pdf_page_counts': {rel: len(PdfReader(rel).pages) for rel in pdfs},
              'files': files,
          }
          (root / 'artifact-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n')
          PY

      - name: Commit corrected campaign to main
        run: |
          set -euo pipefail
          git config user.name 'Russell Dudek'
          git config user.email 'russelldudek@gmail.com'
          git add -A
          git commit -m 'Strengthen the 120-day plan and remove source-control links'
          git push origin HEAD:main
